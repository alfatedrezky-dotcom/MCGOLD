<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTERCALL AI | GOD MODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .slide { display: none; }
        .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn.active-nav { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="p-4 bg-black text-xs">

    <div class="max-w-md mx-auto mb-6 grid grid-cols-4 gap-2 glass p-2 rounded-2xl sticky top-0 z-50">
        <button onclick="showSlide(1)" id="nav1" class="nav-btn active-nav p-3 rounded-xl"><i class="fa-solid fa-house"></i></button>
        <button onclick="showSlide(2)" id="nav2" class="nav-btn p-3 rounded-xl glass text-gray-500"><i class="fa-solid fa-chart-line"></i></button>
        <button onclick="showSlide(3)" id="nav3" class="nav-btn p-3 rounded-xl glass text-gray-500"><i class="fa-solid fa-calendar-days"></i></button>
        <button onclick="showSlide(4)" id="nav4" class="nav-btn p-3 rounded-xl glass text-gray-500"><i class="fa-solid fa-robot"></i></button>
    </div>

    <div id="slide1" class="slide active max-w-md mx-auto">
        <div class="glass p-10 rounded-[2.5rem] text-center mb-6">
            <h2 id="livePrice" class="text-6xl font-black mb-2 tracking-tighter font-mono">$0.00</h2>
            <p class="text-blue-500 font-bold tracking-[0.3em] flex items-center justify-center gap-2 uppercase">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></span> Live Market
            </p>
        </div>
    </div>

    <div id="slide2" class="slide max-w-md mx-auto h-[480px]">
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA%3AXAUUSD&interval=15&theme=dark" width="100%" height="100%" frameborder="0" style="border-radius:24px;"></iframe>
    </div>

    <div id="slide3" class="slide max-w-md mx-auto h-[480px] overflow-hidden rounded-[24px]">
        <iframe src="https://sslecal2.investing.com?columns=exc_flags,exc_currency,exc_importance,exc_actual,exc_forecast,exc_previous&category=_main&importance=2,3&features=datepicker,timezone&countries=5&calType=day&timeZone=15&lang=1" width="100%" height="100%" frameborder="0"></iframe>
    </div>

    <div id="slide4" class="slide max-w-md mx-auto">
        <div class="glass p-6 rounded-[2rem] border-t-4 border-blue-600">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-gray-500 uppercase">MasterCall AI</h3>
                <span id="aiMode" class="px-3 py-1 rounded-full text-[9px] font-black bg-blue-600 uppercase">--</span>
            </div>
            
            <div class="grid grid-cols-5 gap-1 mb-6">
                <div class="p-2 bg-white/5 rounded-lg text-center"><p class="text-gray-500">M1</p><p id="valM1" class="font-bold">--</p></div>
                <div class="p-2 bg-white/5 rounded-lg text-center"><p class="text-gray-500">M5</p><p id="valM5" class="font-bold">--</p></div>
                <div class="p-2 bg-white/5 rounded-lg text-center"><p class="text-gray-500">M15</p><p id="valM15" class="font-bold">--</p></div>
                <div class="p-2 bg-white/5 rounded-lg text-center"><p class="text-gray-500">H1</p><p id="valH1" class="font-bold">--</p></div>
                <div class="p-2 bg-blue-600/20 rounded-lg text-center"><p class="text-blue-400">H4</p><p id="valH4" class="font-bold">--</p></div>
            </div>

            <div class="bg-white/5 p-4 rounded-2xl mb-4 border-l-4 border-blue-500">
                <p id="terminalBias" class="text-xl font-black text-white uppercase">--</p>
            </div>

            <div class="space-y-3 mb-6">
                <div class="flex justify-between p-4 glass rounded-xl"><span>TARGET TP</span><span id="terminalTP" class="text-green-400 font-bold font-mono">--</span></div>
                <div class="flex justify-between p-4 glass rounded-xl"><span>STOP LOSS</span><span id="terminalSL" class="text-red-400 font-bold font-mono">--</span></div>
            </div>
            <p id="terminalStatus" class="text-center text-[9px] text-gray-600 font-bold uppercase tracking-widest">--</p>
        </div>
    </div>

    <script>
        const API_URL = "https://fast-api-server--rezkyalfayed56.replit.app";

        function showSlide(num) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active-nav');
                b.classList.add('glass', 'text-gray-500');
            });
            document.getElementById('slide' + num).classList.add('active');
            const active = document.getElementById('nav' + num);
            active.classList.add('active-nav');
            active.classList.remove('glass', 'text-gray-500');
        }

        async function fetchSignal() {
            try {
                const res = await fetch(`${API_URL}/analyze`);
                const data = await res.json();
                
                document.getElementById('livePrice').innerText = `$${data.price}`;
                document.getElementById('terminalBias').innerText = data.bias;
                document.getElementById('terminalTP').innerText = data.tp_data;
                document.getElementById('terminalSL').innerText = data.sl_data;
                document.getElementById('aiMode').innerText = data.mode;
                document.getElementById('terminalStatus').innerText = data.status;

                document.getElementById('valM1').innerText = data.m1;
                document.getElementById('valM5').innerText = data.m5;
                document.getElementById('valM15').innerText = data.m15;
                document.getElementById('valH1').innerText = data.h1;
                document.getElementById('valH4').innerText = data.h4;

                const badge = document.getElementById('aiMode');
                if(data.mode.includes("GOD")) badge.className = "px-3 py-1 rounded-full text-[9px] font-black bg-yellow-500 text-black animate-bounce";
                else if(data.mode.includes("STRONG")) badge.className = "px-3 py-1 rounded-full text-[9px] font-black bg-red-600 text-white animate-pulse";
                else badge.className = "px-3 py-1 rounded-full text-[9px] font-black bg-blue-600 text-white";

                ['valM1','valM5','valM15','valH1','valH4'].forEach(id => {
                    const el = document.getElementById(id);
                    el.style.color = el.innerText === "BULLISH" ? "#4ade80" : "#f87171";
                });
            } catch (e) { console.log("Retrying..."); }
        }

        function syncClock() {
            if (new Date().getSeconds() === 0) {
                fetchSignal();
                setTimeout(syncClock, 2000);
            } else { setTimeout(syncClock, 500); }
        }

        syncClock();
        fetchSignal();
    </script>
</body>
</html>
