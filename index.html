<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTERCALL AI | V4.0 ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #f4f4f5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 16, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .slide { display: none; animation: slideIn 0.4s ease-out; }
        .active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .nav-btn.active-nav { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
    </style>
</head>
<body class="p-4 bg-black">

    <div class="max-w-md mx-auto mb-6 grid grid-cols-4 gap-2 glass p-2 rounded-2xl">
        <button onclick="showSlide(1)" id="nav1" class="nav-btn active-nav p-3 rounded-xl text-xs transition-all"><i class="fa-solid fa-house"></i></button>
        <button onclick="showSlide(2)" id="nav2" class="nav-btn p-3 rounded-xl text-xs transition-all glass text-gray-500"><i class="fa-solid fa-chart-simple"></i></button>
        <button onclick="showSlide(3)" id="nav3" class="nav-btn p-3 rounded-xl text-xs transition-all glass text-gray-500"><i class="fa-solid fa-newspaper"></i></button>
        <button onclick="showSlide(4)" id="nav4" class="nav-btn p-3 rounded-xl text-xs transition-all glass text-gray-500"><i class="fa-solid fa-robot"></i></button>
    </div>

    <div id="slide1" class="slide active max-w-md mx-auto">
        <div class="glass p-8 rounded-[2.5rem] text-center mb-6">
            <p class="text-blue-500 text-[10px] font-black uppercase tracking-[0.3em] mb-2">Live Market Data</p>
            <h2 id="livePrice" class="text-5xl font-black mb-2 tracking-tighter text-white">$0.00</h2>
            <p class="text-gray-500 text-xs">XAUUSD • Gold Spot</p>
        </div>
        <button onclick="getSignal()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xs btn-glow transition-all active:scale-95">
            ANALYZE MARKET
        </button>
    </div>

    <div id="slide2" class="slide max-w-md mx-auto">
        <div class="glass p-1 rounded-3xl h-[450px] overflow-hidden">
            <iframe src="https://s.tradingview.com/widgetembed/?symbol=FX%3AXAUUSD&interval=5&theme=dark" style="width: 100%; height: 100%;" frameborder="0"></iframe>
        </div>
    </div>

    <div id="slide3" class="slide max-w-md mx-auto text-xs">
        <div class="glass p-6 rounded-3xl">
            <h3 class="font-bold text-sm mb-4"><i class="fa-solid fa-calendar-day mr-2 text-blue-500"></i> Economic News</h3>
            <div class="space-y-3">
                <div class="p-3 bg-white/5 rounded-xl border-l-2 border-red-500">USD - High Impact News Coming</div>
                <div class="p-3 bg-white/5 rounded-xl border-l-2 border-blue-500">XAUUSD - Market Sideways ahead of FOMC</div>
            </div>
        </div>
    </div>

    <div id="slide4" class="slide max-w-md mx-auto">
        <div class="glass p-6 rounded-[2rem] border-t-4 border-blue-600">
            <div class="flex justify-between items-start mb-6">
                <h3 class="font-black text-lg text-white">SIGNAL OUTPUT</h3>
                <span id="terminalStatus" class="text-[10px] px-3 py-1 rounded-full border border-blue-500 text-blue-400 font-bold uppercase">WAITING</span>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="p-4 bg-white/5 rounded-2xl">
                    <p class="text-[9px] text-gray-500 uppercase">Bias Action</p>
                    <p id="terminalBias" class="font-bold text-sm text-white">--</p>
                </div>
                <div class="p-4 bg-white/5 rounded-2xl">
                    <p class="text-[9px] text-gray-500 uppercase">Structure</p>
                    <p id="terminalMS" class="font-bold text-sm text-white">--</p>
                </div>
            </div>

            <div id="signalData" class="space-y-3">
                <div class="flex justify-between p-3 glass rounded-xl text-xs">
                    <span class="text-gray-400 tracking-wider uppercase">Target TP</span> 
                    <span id="terminalTP" class="text-green-400 font-bold">0.00</span>
                </div>
                <div class="flex justify-between p-3 glass rounded-xl text-xs">
                    <span class="text-gray-400 tracking-wider uppercase">Stop Loss</span> 
                    <span id="terminalSL" class="text-red-400 font-bold">0.00</span>
                </div>
            </div>
        </div>
        <p id="warningBox" class="text-center text-[10px] text-yellow-500 mt-4 px-4 font-medium hidden"></p>
    </div>

    <script>
        // 1. MASUKKAN LINK REPLIT LO DI SINI
        const API_URL = "https://fast-api-server--rezkyalfayed56.replit.app";

        // 2. FUNGSI UNTUK PINDAH SLIDE
        function showSlide(num) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active-nav', 'text-white');
                b.classList.add('glass', 'text-gray-500');
            });
            document.getElementById('slide' + num).classList.add('active');
            document.getElementById('nav' + num).classList.add('active-nav', 'text-white');
            document.getElementById('nav' + num).classList.remove('glass', 'text-gray-500');
        }

        // 3. FUNGSI UTAMA AMBIL DATA (SINKRONISASI)
        async function getSignal() {
            const btn = document.querySelector('button[onclick="getSignal()"]');
            btn.innerHTML = '<i class="fa-solid fa-sync fa-spin"></i> ANALYZING...';
            
            try {
                // Ngetok pintu ke Replit
                const res = await fetch(`${API_URL}/analyze`);
                const data = await res.json();

                // Memasukkan data dari Replit ke ID yang ada di HTML (Sinkron)
                document.getElementById('livePrice').innerText = `$${data.price}`;
                document.getElementById('terminalBias').innerText = data.bias;
                document.getElementById('terminalMS').innerText = data.structure;
                document.getElementById('terminalTP').innerText = data.tp;
                document.getElementById('terminalSL').innerText = data.sl;
                document.getElementById('terminalStatus').innerText = data.status.replace(/✅|❌/g, '');

                // Logic Warning Box
                const warn = document.getElementById('warningBox');
                if (data.status.includes("DONT")) {
                    warn.innerText = "⚠ Market Sedang Ranging. Disarankan Wait & See.";
                    warn.classList.remove('hidden');
                    document.getElementById('terminalStatus').className = "text-[10px] px-3 py-1 rounded-full border border-yellow-500 text-yellow-500 font-bold uppercase";
                } else {
                    warn.classList.add('hidden');
                    document.getElementById('terminalStatus').className = "text-[10px] px-3 py-1 rounded-full border border-blue-500 text-blue-400 font-bold uppercase";
                }

                // Pindah Slide Otomatis ke Slide 4
                setTimeout(() => showSlide(4), 500);

            } catch (err) {
                alert("Server Replit Offline! Klik 'Run' dulu di Replit lo.");
            } finally {
                btn.innerHTML = 'ANALYZE MARKET';
            }
        }
    </script>
</body>
</html>
