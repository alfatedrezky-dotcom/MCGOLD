<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTERCALL AI V4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .slide { display: none; }
        .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn.active-nav { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto mb-6 grid grid-cols-4 gap-2 glass p-2 rounded-2xl sticky top-0 z-50">
        <button onclick="showSlide(1)" id="nav1" class="nav-btn active-nav p-3 rounded-xl"><i class="fa-solid fa-house"></i></button>
        <button onclick="showSlide(2)" id="nav2" class="nav-btn p-3 rounded-xl glass text-gray-500"><i class="fa-solid fa-chart-line"></i></button>
        <button onclick="showSlide(3)" id="nav3" class="nav-btn p-3 rounded-xl glass text-gray-500"><i class="fa-solid fa-calendar"></i></button>
        <button onclick="showSlide(4)" id="nav4" class="nav-btn p-3 rounded-xl glass text-gray-500"><i class="fa-solid fa-robot"></i></button>
    </div>

    <div id="slide1" class="slide active max-w-md mx-auto text-center">
        <div class="glass p-10 rounded-[2.5rem] mb-6">
            <h2 id="livePrice" class="text-6xl font-black mb-2 tracking-tighter font-mono text-white">$0.00</h2>
            <p class="text-blue-500 text-[10px] font-bold tracking-[0.3em] uppercase">Market Live</p>
        </div>
    </div>

    <div id="slide2" class="slide max-w-md mx-auto h-[480px]">
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA%3AXAUUSD&interval=15&theme=dark" width="100%" height="100%" frameborder="0" style="border-radius:24px;"></iframe>
    </div>

    <div id="slide3" class="slide max-w-md mx-auto h-[480px] overflow-hidden rounded-[24px]">
        <iframe src="https://sslecal2.investing.com?columns=exc_flags,exc_currency,exc_importance,exc_actual,exc_forecast,exc_previous&category=_main&importance=2,3&features=datepicker,timezone&countries=5&calType=day&timeZone=15&lang=1" width="100%" height="100%" frameborder="0"></iframe>
    </div>

    <div id="slide4" class="slide max-w-md mx-auto">
        <div class="glass p-6 rounded-[2rem] border-t-4 border-blue-600">
            <div class="flex justify-between items-center mb-4">
                <span id="aiMode" class="px-3 py-1 rounded-full text-[9px] font-black bg-blue-600">SCANNING...</span>
                <span id="terminalStatus" class="text-[8px] text-gray-500 font-mono">--</span>
            </div>
            
            <div class="grid grid-cols-5 gap-1 mb-6">
                <div class="p-2 bg-white/5 rounded-lg text-center"><p class="text-[8px] text-gray-500">M1</p><p id="valM1" class="text-[9px] font-bold">--</p></div>
                <div class="p-2 bg-white/5 rounded-lg text-center"><p class="text-[8px] text-gray-500">M5</p><p id="valM5" class="text-[9px] font-bold">--</p></div>
                <div class="p-2 bg-white/5 rounded-lg text-center"><p class="text-[8px] text-gray-500">M15</p><p id="valM15" class="text-[9px] font-bold">--</p></div>
                <div class="p-2 bg-white/5 rounded-lg text-center"><p class="text-[8px] text-gray-500">H1</p><p id="valH1" class="text-[9px] font-bold">--</p></div>
                <div class="p-2 bg-blue-600/20 rounded-lg text-center"><p class="text-[8px] text-blue-400">H4</p><p id="valH4" class="text-[9px] font-bold">--</p></div>
            </div>

            <div class="bg-white/5 p-4 rounded-2xl mb-4">
                <p id="terminalBias" class="text-xl font-black text-white">READY TO SCAN</p>
            </div>

            <div class="space-y-2 text-xs">
                <div class="flex justify-between p-3 glass rounded-xl"><span>TARGET TP</span><span id="terminalTP" class="text-green-400 font-bold">--</span></div>
                <div class="flex justify-between p-3 glass rounded-xl"><span>STOP LOSS</span><span id="terminalSL" class="text-red-400 font-bold">--</span></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://fast-api-server--rezkyalfayed56.replit.app"; // PASTIIN INI BENER!

        function showSlide(num) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active-nav');
                b.classList.add('glass', 'text-gray-500');
            });
            document.getElementById('slide' + num).classList.add('active');
            document.getElementById('nav' + num).classList.add('active-nav');
        }

        async function fetchSignal() {
            try {
                const res = await fetch(`${API_URL}/analyze`);
                const data = await res.json();
                
                // Update UI dengan aman
                document.getElementById('livePrice').innerText = `$${data.price || '0.00'}`;
                document.getElementById('terminalBias').innerText = data.bias || 'WAITING';
                document.getElementById('aiMode').innerText = data.mode || 'SCANNING';
                document.getElementById('terminalTP').innerText = data.tp_data || '--';
                document.getElementById('terminalSL').innerText = data.sl_data || '--';
                document.getElementById('terminalStatus').innerText = data.status || '--';

                const tfs = ['M1','M5','M15','H1','H4'];
                tfs.forEach(tf => {
                    const el = document.getElementById('val' + tf);
                    const val = data[tf.toLowerCase()];
                    el.innerText = val || '--';
                    el.style.color = val === "BULLISH" ? "#4ade80" : "#f87171";
                });

                // Efek God Mode
                const badge = document.getElementById('aiMode');
                if(data.mode && data.mode.includes("GOD")) badge.className = "px-3 py-1 rounded-full text-[9px] font-black bg-yellow-500 text-black animate-bounce";
                else badge.className = "px-3 py-1 rounded-full text-[9px] font-black bg-blue-600 text-white";

            } catch (e) {
                console.log("Koneksi Replit Putus/Salah URL");
                document.getElementById('terminalBias').innerText = "CONNECTING...";
            }
        }

        function syncClock() {
            if (new Date().getSeconds() === 0) {
                fetchSignal();
                setTimeout(syncClock, 2000);
            } else { setTimeout(syncClock, 500); }
        }

        syncClock();
        fetchSignal();
    </script>
</body>
</html>
