<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTERCALL AI | V4.0 ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #f4f4f5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 16, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .slide { display: none; animation: slideIn 0.3s ease-out; }
        .active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active-nav { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        iframe { border-radius: 16px; border: none; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto mb-6 grid grid-cols-4 gap-2 glass p-2 rounded-2xl sticky top-2 z-50">
        <button onclick="showSlide(1)" id="nav1" class="nav-btn active-nav p-3 rounded-xl text-xs transition-all"><i class="fa-solid fa-house"></i></button>
        <button onclick="showSlide(2)" id="nav2" class="nav-btn p-3 rounded-xl text-xs transition-all glass text-gray-500"><i class="fa-solid fa-chart-line"></i></button>
        <button onclick="showSlide(3)" id="nav3" class="nav-btn p-3 rounded-xl text-xs transition-all glass text-gray-500"><i class="fa-solid fa-calendar-days"></i></button>
        <button onclick="showSlide(4)" id="nav4" class="nav-btn p-3 rounded-xl text-xs transition-all glass text-gray-500"><i class="fa-solid fa-robot"></i></button>
    </div>

    <div id="slide1" class="slide active max-w-md mx-auto">
        <div class="glass p-8 rounded-[2.5rem] text-center mb-6">
            <p class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-2">Gold Live Price</p>
            <h2 id="livePrice" class="text-5xl font-black mb-2 tracking-tighter text-white font-mono">$0.00</h2>
            <p class="text-gray-500 text-[10px]">XAUUSD • Real-time Stream</p>
        </div>
        <button onclick="getSignal()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-xs transition-all active:scale-95 shadow-lg shadow-blue-900/20">
            RUN AI ANALYSIS
        </button>
    </div>

    <div id="slide2" class="slide max-w-md mx-auto">
        <div class="glass p-2 rounded-3xl h-[500px]">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_1&symbol=OANDA%3AXAUUSD&interval=15&hidesidetoolbar=1&hidetoptoolbar=1&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=MA%40tv-basicstudies&theme=dark&style=1&timezone=Asia%2FJakarta" style="width: 100%; height: 100%;"></iframe>
            </div>
        </div>
    </div>

    <div id="slide3" class="slide max-w-md mx-auto">
        <div class="glass p-2 rounded-3xl h-[500px] overflow-hidden">
            <h3 class="text-center text-[10px] font-bold py-2 text-gray-400 uppercase">Global Economic Calendar</h3>
            <iframe src="https://www.widgets.investing.com/live-economic-calendar?theme=darkTheme&roundedCorners=true&countries=5&events=1,2,3&importance=2,3&timeZone=28&lang=1" width="100%" height="90%" frameborder="0" allowtransparency="true" marginwidth="0" marginheight="0"></iframe>
        </div>
    </div>

    <div id="slide4" class="slide max-w-md mx-auto">
        <div class="glass p-6 rounded-[2rem] border-t-4 border-blue-600">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-lg">AI OUTPUT</h3>
                <span id="terminalStatus" class="text-[9px] px-3 py-1 rounded-full border border-blue-500 text-blue-400 font-bold uppercase">READY</span>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-4 text-[11px]">
                <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                    <p class="text-gray-500 mb-1 uppercase">Bias</p>
                    <p id="terminalBias" class="font-bold text-white">--</p>
                </div>
                <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                    <p class="text-gray-500 mb-1 uppercase">Structure</p>
                    <p id="terminalMS" class="font-bold text-white text-[10px]">--</p>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between p-4 glass rounded-xl text-xs">
                    <span class="text-gray-400 uppercase">Target TP</span> 
                    <span id="terminalTP" class="text-green-400 font-mono font-bold text-sm">--</span>
                </div>
                <div class="flex justify-between p-4 glass rounded-xl text-xs">
                    <span class="text-gray-400 uppercase">Stop Loss</span> 
                    <span id="terminalSL" class="text-red-400 font-mono font-bold text-sm">--</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GANTI INI DENGAN LINK REPLIT LO!
        const API_URL = "https://fast-api-server--rezkyalfayed56.replit.app";

        function showSlide(num) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active-nav', 'text-white');
                b.classList.add('glass', 'text-gray-500');
            });
            document.getElementById('slide' + num).classList.add('active');
            const activeNav = document.getElementById('nav' + num);
            activeNav.classList.add('active-nav', 'text-white');
            activeNav.classList.remove('glass', 'text-gray-500');
        }

        async function getSignal() {
            const btn = document.querySelector('button[onclick="getSignal()"]');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            
            try {
                const res = await fetch(`${API_URL}/analyze`);
                const data = await res.json();

                // Sinkronisasi data ke ID (Pastiin namanya sama dengan Python)
                document.getElementById('livePrice').innerText = `$${data.price}`;
                document.getElementById('terminalBias').innerText = data.bias;
                document.getElementById('terminalMS').innerText = data.structure;
                document.getElementById('terminalTP').innerText = data.tp;
                document.getElementById('terminalSL').innerText = data.sl;
                document.getElementById('terminalStatus').innerText = data.status;

                // Auto-move ke slide hasil
                setTimeout(() => showSlide(4), 400);

            } catch (err) {
                alert("Server Offline! Pastikan Replit sudah di-RUN.");
            } finally {
                btn.innerHTML = 'RUN AI ANALYSIS';
            }
        }
    </script>
</body>
</html>
